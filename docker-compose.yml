services:
  django-web:
    build: .
    image: gsas-dockerimg:latest
    container_name: gsas_web
    volumes:
      - staticfiles:/app/staticfiles
    env_file:
      - .env
  
  frontend-proxy:
    image: nginx:latest
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles:/static:ro
    depends_on:
      - django-web

volumes:
  staticfiles: