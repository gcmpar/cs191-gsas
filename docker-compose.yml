services:
  django-web:
    build: .
    container_name: gsas_web
    volumes:
      - ./static:/app/staticfiles
    env_file:
      - .env
  
  frontend-proxy:
    image: nginx:latest
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static:ro
    depends_on:
      - django-web