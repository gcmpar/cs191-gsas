{% load widget_tweaks %}

<div class="equiv-form flex items-center gap-2" data-index="{{ index }}">
    {% if course_form.errors %}
        <div class="text-error text-sm">{{ course_form.errors }}</div>
    {% endif %}
    <div class="flex-grow max-w-md">
        {% render_field course_form.course class="select select-bordered select-sm w-full" %}
{% if course_form.course.errors %}
  <div class="label pb-0">
    <span class="label-text-alt text-error">
      {% for error in course_form.course.errors %}{{ error }} {% endfor %}
    </span>
  </div>
{% endif %}
    </div>

    <button
        type="button"
        class="btn btn-sm btn-ghost text-error"
        onclick="this.closest('.equiv-form').remove()"
    >
        ✕
    </button>
</div>
