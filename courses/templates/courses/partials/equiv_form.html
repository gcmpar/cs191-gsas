{% load widget_tweaks %}
{% load django_bootstrap5 %}

<div class="equiv-form flex flex-row">
    {% bootstrap_form_errors equiv_form %}
    {% render_field equiv_form.course class="w-25" %}

    <button
        type="button"
        class="btn"
        onclick="this.closest('.equiv-form').remove()"
    >
        Remove
    </button>

</div>
