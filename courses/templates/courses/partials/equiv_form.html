{% load widget_tweaks %}

<div class="equiv-form flex items-center gap-2">
    {% if equiv_form.errors %}
        <div class="text-error text-sm">{{ equiv_form.errors }}</div>
    {% endif %}
    <div class="flex-grow max-w-md">
        {% render_field equiv_form.course class="select select-bordered select-sm w-full" %}
    </div>

    <button
        type="button"
        class="btn btn-sm btn-ghost text-error"
        onclick="this.closest('.equiv-form').remove()"
    >
        ✕
    </button>
</div>
