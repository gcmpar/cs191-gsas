<!DOCTYPE html>
<html>
<head>
  <title>Course #{{ course.course_id }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<div class="d-flex justify-content-between align-items-center mb-3">
  <div class="d-flex gap-2">
    <a href="{% url 'home' %}" class="btn btn-outline-secondary">⌂ Home</a>
    <a href="{% url 'courses:search' %}" class="btn btn-secondary">← Courses</a>
  </div>
  <a href="{% url 'courses:edit' course.course_id %}" class="btn btn-primary">Edit</a>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">Course #{{ course.course_id }}</h5></div>
  <div class="card-body">
    <p><strong>Course Code:</strong> {{ course.course_code }}</p>
    <p><strong>Course Name:</strong> {{ course.course_name }}</p>
    <p><strong>Units:</strong> {{ course.units }}</p>
    <p><strong>Description:</strong> {{ course.description }}</p>
    <hr>
    <p><strong>School:</strong> {{ course.program.school.school_name }}</p>
    <p><strong>Program:</strong> {{ course.program.program_name }}</p>
  </div>
</div>

</body>
</html>
