<div class="card mb-4">
  <div class="card-header"><h5 class="mb-0">Applications</h5></div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>App Number</th>
          <th>Program</th>
          <th>Date Applied</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        {% for app in applications %}
        <tr style="cursor:pointer" onclick="window.location='{% url 'applications:view' app.application_id %}'">
          <td>{{ app.application_id }}</td>
          <td>{{ app.application_number }}</td>
          <td>{{ app.program }}</td>
          <td>{{ app.date_applied }}</td>
          <td>{{ app.application_status }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="text-muted">No applications.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
