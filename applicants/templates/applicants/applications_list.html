<div class="card bg-base-100 border border-base-300 shadow-sm mb-6 max-w-4xl">
  <div class="card-body p-0">
    <h2 class="card-title text-xl p-4 border-b border-base-200 m-0">Applications</h2>
    <div class="overflow-x-auto">
      <table class="table table-zebra w-full mb-0">
        <thead class="bg-base-200">
          <tr>
            <th>ID</th>
            <th>App Number</th>
            <th>Program</th>
            <th>Date Applied</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          {% for app in applications %}
          <tr class="hover cursor-pointer" onclick="window.location='{% url 'applications:general_view' app.application_id %}'">
            <td>{{ app.application_id }}</td>
            <td>{{ app.application_number }}</td>
            <td>{{ app.program }}</td>
            <td>{{ app.date_applied }}</td>
            <td>{{ app.application_status }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="5" class="text-center text-base-content/50 py-4">No applications.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
