<!DOCTYPE html>
<html>
<head>
  <title>School #{{ school.school_id }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<div class="d-flex justify-content-between align-items-center mb-3">
  <div class="d-flex gap-2">
    <a href="{% url 'schools:search' %}" class="btn btn-secondary">← Schools</a>
  </div>
  <a href="{% url 'schools:edit' school.school_id %}" class="btn btn-primary">Edit</a>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">School #{{ school.school_id }}</h5></div>
  <div class="card-body">
    <p><strong>School Name:</strong> {{ school.school_name }}</p>
  </div>
</div>

</body>
</html>
