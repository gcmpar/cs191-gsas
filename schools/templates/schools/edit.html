{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}Edit School #{{ school.school_id }}{% endblock title %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <div class="d-flex gap-2">
    <a href="{% url 'schools:view' school.school_id %}" class="btn btn-secondary">← Cancel</a>
  </div>
  <form method="post" action="{% url 'schools:delete' school.school_id %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"
      onclick="return confirm('Delete this school? This cannot be undone.')">
      Delete
    </button>
  </form>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">Edit School #{{ school.school_id }}</h5></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% bootstrap_form form %}
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>
</div>

{% endblock content %}
