<!DOCTYPE html>
<html>
<head>
  <title>Edit School #{{ school.school_id }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<div class="d-flex justify-content-between align-items-center mb-3">
  <div class="d-flex gap-2">
    <a href="{% url 'home' %}" class="btn btn-outline-secondary">⌂ Home</a>
    <a href="{% url 'schools:view' school.school_id %}" class="btn btn-secondary">← Cancel</a>
  </div>
  <form method="post" action="{% url 'schools:delete' school.school_id %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"
      onclick="return confirm('Delete this school? This cannot be undone.')">
      Delete
    </button>
  </form>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">Edit School #{{ school.school_id }}</h5></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>
</div>

</body>
</html>
