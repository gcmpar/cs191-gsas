<!DOCTYPE html>
<html>
<head>
  <title>Schools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Schools</h2>
  <div class="d-flex gap-2">
    <a href="{% url 'schools:add' %}" class="btn btn-success">+ Add School</a>
  </div>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">All Schools</h5></div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>School Name</th>
        </tr>
      </thead>
      <tbody>
        {% for school in schools %}
        <tr style="cursor:pointer" onclick="window.location='{% url 'schools:view' school.school_id %}'">
          <td>{{ school.school_id }}</td>
          <td>{{ school.school_name }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="2" class="text-muted">No schools found.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
