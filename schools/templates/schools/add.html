{% extends "base.html" %}


{% block title %}
  Add School
{% endblock title %}

{% block content %}

  <div class="flex justify-between items-center mb-6 mt-4">
    <div class="flex gap-2">
      <a href="{% url 'schools:search' %}" class="btn btn-ghost btn-sm">← Cancel</a>
    </div>
  </div>

  <div class="card bg-base-100 border border-base-300 shadow-sm max-w-2xl">
    <div class="card-body">
      <h2 class="card-title text-xl border-b border-base-200 pb-2 mb-4">Add School</h2>
      <form method="post">
        {% csrf_token %}
        {% include "form_snippet.html" with form=form %}
        <div class="mt-6 flex justify-end">
          <button type="submit" class="btn btn-success">Add</button>
        </div>
      </form>
    </div>
  </div>

{% endblock content %}
