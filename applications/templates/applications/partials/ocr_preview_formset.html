{% load widget_tweaks %}

<form method="post">
  {% csrf_token %}
  <div class="mb-6 flex gap-2 flex-wrap">
    <a href="{% url 'courses:add' %}"
      target="_blank"
      class="btn btn-sm btn-outline btn-primary">
      ＋ Create Course
    </a>
    <button 
      hx-get="{% url 'applications:ocr_preview' application.application_id %}?detect_courses=true"
      hx-include="closest form"
      hx-swap="none"
      class="btn btn-sm btn-outline btn-secondary">
      ↺ Refresh and Auto-Detect Courses
    </button>
  </div>

  <div class="card bg-base-100 border border-base-300 shadow-sm mb-6">
    <div class="overflow-x-auto">
      <table class="table table-zebra w-full mb-0 min-w-[1200px]">
        <thead class="bg-base-300 text-base-content/70">
          <tr>
            <th>✓</th>
            <th>Scanned Code</th>
            <th>Scanned Name</th>
            <th>Scanned Units</th>
            <th>Course</th>
            <th>Course Link</th>
            <th>Grade</th>
            <th>Units</th>
          </tr>
        </thead>
        <tbody>
          {{ formset.management_form }}
          {% for form in formset %}
            {% include "applications/partials/ocr_preview_form.html" with form=form %}
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

  <div class="flex gap-2">
    <button type="submit" class="btn btn-success">Save to Application</button>
    <a href="{% url 'applications:transcripts_edit' application.application_id %}"
       class="btn btn-ghost">← Back to Edit</a>
  </div>
</form>
