{% extends "base.html" %}
{% load django_bootstrap5 %}


{% block title %}Add Application{% endblock title %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <div class="d-flex gap-2">
    <a href="{% url 'applications:search' %}" class="btn btn-secondary">← Cancel</a>
  </div>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">Add Application</h5></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% bootstrap_form form %}
      <button type="submit" class="btn btn-success">Add</button>
    </form>
  </div>
</div>

{% endblock content %}
