<!DOCTYPE html>
<html>
<head>
  <title>Programs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Programs</h2>
  <div class="d-flex gap-2">
    <a href="{% url 'programs:add' %}" class="btn btn-success">+ Add Program</a>
  </div>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">All Programs</h5></div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Program Name</th>
          <th>School</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        {% for program in programs %}
        <tr style="cursor:pointer" onclick="window.location='{% url 'programs:view' program.program_id %}'">
          <td>{{ program.program_id }}</td>
          <td>{{ program.program_name }}</td>
          <td>{{ program.school.school_name }}</td>
          <td>{{ program.description }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="text-muted">No programs found.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
