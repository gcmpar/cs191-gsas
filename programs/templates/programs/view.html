<!DOCTYPE html>
<html>
<head>
  <title>Program #{{ program.program_id }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<div class="d-flex justify-content-between align-items-center mb-3">
  <div class="d-flex gap-2">
    <a href="{% url 'programs:search' %}" class="btn btn-secondary">← Programs</a>
  </div>
  <a href="{% url 'programs:edit' program.program_id %}" class="btn btn-primary">Edit</a>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">Program #{{ program.program_id }}</h5></div>
  <div class="card-body">
    <p><strong>Program Name:</strong> {{ program.program_name }}</p>
    <p><strong>School:</strong> {{ program.school.school_name }}</p>
    <p><strong>Description:</strong> {{ program.description }}</p>
  </div>
</div>

</body>
</html>
