{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}Add Program{% endblock title %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <div class="d-flex gap-2">
    <a href="{% url 'programs:search' %}" class="btn btn-secondary">← Cancel</a>
  </div>
</div>

<div class="card">
  <div class="card-header"><h5 class="mb-0">Add Program</h5></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-success">Add</button>
    </form>
  </div>
</div>

{% endblock content %}
